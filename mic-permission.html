<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Pochoclo - Permiso de micrófono</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #f9fafb;
      color: #1a1a2e;
    }
    .card {
      text-align: center;
      background: #fff;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      max-width: 400px;
    }
    h2 { font-size: 18px; margin-bottom: 8px; }
    p { font-size: 14px; color: #6b7280; margin-bottom: 24px; line-height: 1.6; }
    .status { font-size: 14px; font-weight: 500; margin-top: 16px; }
    .status.ok { color: #16a34a; }
    .status.err { color: #dc2626; }
  </style>
</head>
<body>
  <div class="card">
    <h2>🎙️ Pochoclo necesita acceso al micrófono</h2>
    <p>Esto es necesario para que la transcripción en vivo funcione.<br>
       El micrófono NO se usa para grabar — solo activa el motor de voz de Chrome.</p>
    <div class="status" id="status">Solicitando permiso...</div>
  </div>
  <script src="mic-permission.js"></script>
</body>
</html>
